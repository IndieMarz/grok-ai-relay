name: Feature request
description: Suggest an enhancement for grok-ai-relay
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Share what you'd like to see. Small, focused proposals are easiest to ship.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What gap does this fill for your workflow?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: API sketch, flags, or behavior you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other libraries, workarounds, or API shapes.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This stays within chat-completions relay scope (not full xAI SDK replacement)
          required: false
        - label: I am willing to help implement this
          required: false
