name: Question / support
description: Ask about usage of grok-ai-relay
title: "[Question]: "
labels: ["question", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        For official API behavior, also check [docs.x.ai](https://docs.x.ai).
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
  - type: textarea
    id: code
    attributes:
      label: Relevant code (optional)
      render: python
