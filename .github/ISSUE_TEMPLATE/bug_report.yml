name: Bug report
description: Report a problem with grok-ai-relay
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        **Never paste API keys or secrets.**
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences?
      placeholder: Streaming hangs after the first token when…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal code or commands (sanitize secrets).
      render: python
      placeholder: |
        from grok_ai_relay import send_to_grok
        send_to_grok("hello")
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include full traceback if available.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      description: `python -c "import grok_ai_relay; print(grok_ai_relay.__version__)"`
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.2"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Model name, proxy/`base_url`, retry settings, etc.
