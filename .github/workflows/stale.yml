name: Stale issues and PRs

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 45
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been marked stale due to inactivity. Comment to keep it open,
            or it will be closed in 14 days.
          stale-pr-message: >
            This PR has been marked stale due to inactivity. Push or comment to keep it open,
            or it will be closed in 14 days.
          close-issue-message: Closed due to prolonged inactivity. Feel free to reopen.
          close-pr-message: Closed due to prolonged inactivity. Feel free to reopen.
          exempt-issue-labels: "pinned,security,good first issue"
          exempt-pr-labels: "pinned,security"
          operations-per-run: 40
