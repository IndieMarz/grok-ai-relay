# Canonical label set (applied via scripts/bootstrap_github_labels.py or gh).
- name: bug
  color: "d73a4a"
  description: Something isn't working
- name: enhancement
  color: "a2eeef"
  description: New feature or request
- name: question
  color: "d876e3"
  description: Further information is requested
- name: triage
  color: "fbca04"
  description: Needs initial review
- name: documentation
  color: "0075ca"
  description: Improvements or additions to documentation
- name: good first issue
  color: "7057ff"
  description: Good for newcomers
- name: help wanted
  color: "008672"
  description: Extra attention is needed
- name: dependencies
  color: "0366d6"
  description: Dependency updates
- name: python
  color: "3776ab"
  description: Python package / source changes
- name: ci
  color: "000000"
  description: Continuous integration / workflows
- name: tests
  color: "0e8a16"
  description: Test suite changes
- name: stale
  color: "ffffff"
  description: Inactive issue or PR
- name: security
  color: "b60205"
  description: Security-related
- name: pinned
  color: "0e8a16"
  description: Exempt from stale bot
- name: breaking
  color: "b60205"
  description: Breaking API change
