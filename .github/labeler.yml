# Paths to labels (used by actions/labeler)
python:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**"
          - "tests/**"
          - "examples/**"
          - "pyproject.toml"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "README.md"
          - "CHANGELOG.md"
          - "SECURITY.md"
          - "CODE_OF_CONDUCT.md"
          - "LICENSE"
          - ".github/ISSUE_TEMPLATE/**"
          - ".github/PULL_REQUEST_TEMPLATE.md"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"
          - ".github/labeler.yml"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"
